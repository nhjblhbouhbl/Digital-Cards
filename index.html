<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的數位名片盒 - Fiona Chen</title>
    
    <style>
        :root {
            /* 初始背景顏色 */
            --bg-color: #fdf2f8; 
            --card-bg: #ffffff;
            --primary-text: #4a4a4a;
            --accent-color: #ec4899; /* 玫瑰粉色調 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            /* 背景顏色切換時的平滑過渡效果 */
            transition: background-color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 讓整個 body 變成可點擊區域 */
            cursor: pointer;
            /* 防止手機點擊時產生灰色區塊 */
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.15);
            text-align: center;
            width: 85%;
            max-width: 350px;
            /* 確保卡片內的點擊不會觸發 body 的換色 (阻止冒泡) */
            cursor: default;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            /* 照片旋轉的平滑過渡效果 */
            transition: transform 0.8s ease-in-out;
            cursor: pointer;
            object-fit: cover;
            background-color: #fff1f2;
        }

        /* 互動 Vibe 1：滑鼠移到照片上旋轉 (電腦端) */
        .profile-img:hover {
            transform: rotate(360deg);
        }

        /* 互動 Vibe 1：手指輕點照片旋轉 (手機端加速效果) */
        .profile-img:active {
            transform: scale(1.05) rotate(360deg);
        }

        h1 {
            margin: 1.5rem 0 0.2rem;
            color: var(--primary-text);
            font-size: 2rem;
        }

        .tagline {
            font-size: 1rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: block;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #666;
            margin-bottom: 2.5rem;
            padding: 0 10px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            background-color: var(--accent-color);
            color: white;
            padding: 14px;
            border-radius: 50px; /* 圓角膠囊造型 */
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            display: block;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.3);
        }

        /* 響應式手機版調整 */
        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

    <script>
        // 確保網頁載入完成後才執行腳本
        window.onload = function() {
            const body = document.body;
            const avatar = document.getElementById('avatar');
            const card = document.getElementById('main-card');
            
            // 準備一組漂亮的背景顏色池
            const colors = [
                '#fdf2f8', // 初始粉
                '#f0f9ff', // 天空藍
                '#f5f3ff', // 薰衣草紫
                '#fff7ed', // 杏桃橙
                '#f0fdf4', // 薄荷綠
                '#fafaf9', // 暖石灰
                '#e0f2f1', // 湖水綠
                '#fefce8'  // 奶油黃
            ];

            // 互動 Vibe 2：點擊螢幕隨機換背景顏色
            body.addEventListener('click', function() {
                // 隨機挑選一個顏色，但確保不與當前顏色重複
                let newColor;
                do {
                    newColor = colors[Math.floor(Math.random() * colors.length)];
                } while (newColor === body.style.backgroundColor);
                
                body.style.backgroundColor = newColor;
            });

            // 阻止卡片內部的點擊事件冒泡到 body，避免點擊卡片時也換色
            card.addEventListener('click', function(e) {
                e.stopPropagation(); 
            });

            // 互動 3：點擊大頭照彈出小語
            avatar.addEventListener('click', function(e) {
                // 阻止冒泡，避免同時觸發照片旋轉效果
                e.stopPropagation(); 
                alert("一起環遊世界吧！🌍");
            });
        };
    </script>
